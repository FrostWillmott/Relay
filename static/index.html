<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay — AI Team Assistant</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- highlight.js — syntax highlighting for code blocks -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- marked.js — Markdown → HTML -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

  <!-- DOMPurify — sanitize HTML before insertion -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>

  <!-- React 18 UMD (production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel standalone — JSX in browser (no build step) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ─── Design tokens ──────────────────────────────────────────────────── */
    :root {
      --bg:       #F5F0E8;
      --surface:  #0F0F0F;
      --surface2: #1A1A1A;
      --text:     #0F0F0F;
      --text-inv: #F5F0E8;
      --muted:    #6B6B6B;
      --accent:   #2ECC71;
      --accent-d: #27AE60;
      --danger:   #E74C3C;
      --warn:     #F39C12;
      --radius:   12px;
      --radius-sm:6px;
      --shadow:   0 4px 24px rgba(0,0,0,.12);
      --mono:     'JetBrains Mono', 'Fira Code', monospace;
    }

    /* ─── Reset / base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ─── Layout ─────────────────────────────────────────────────────────── */
    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ─── Header ─────────────────────────────────────────────────────────── */
    .header {
      margin-bottom: 40px;
    }
    .header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }
    .header h1 span { color: var(--accent); }
    .header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 1rem;
    }

    /* ─── Form ───────────────────────────────────────────────────────────── */
    .form-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .form-label {
      display: block;
      color: var(--text-inv);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .form-textarea {
      width: 100%;
      min-height: 120px;
      background: var(--surface2);
      border: 1.5px solid #2A2A2A;
      border-radius: var(--radius-sm);
      color: var(--text-inv);
      font-family: inherit;
      font-size: 0.97rem;
      line-height: 1.6;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color .15s;
    }
    .form-textarea:focus { border-color: var(--accent); }
    .form-textarea::placeholder { color: #555; }
    .form-textarea:disabled { opacity: .5; cursor: not-allowed; }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .form-hint {
      font-size: 0.78rem;
      color: #555;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .15s, transform .1s, opacity .15s;
      padding: 10px 20px;
      user-select: none;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--accent);
      color: #0F0F0F;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-d); }

    .btn-ghost {
      background: #2A2A2A;
      color: var(--text-inv);
      padding: 6px 14px;
      font-size: 0.82rem;
    }
    .btn-ghost:hover:not(:disabled) { background: #333; }

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,.25);
      border-top-color: #0F0F0F;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    /* ─── Error banner ───────────────────────────────────────────────────── */
    .error-banner {
      margin-top: 16px;
      background: #2A0A0A;
      border: 1.5px solid #5A1A1A;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: #F87171;
      font-size: 0.9rem;
    }
    .error-icon { flex-shrink: 0; font-size: 1rem; margin-top: 1px; }

    /* ─── Answer card ────────────────────────────────────────────────────── */
    .answer-card {
      margin-top: 24px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .answer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }
    .answer-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .copy-btn {
      min-width: 80px;
      text-align: center;
    }

    /* ─── Markdown output ────────────────────────────────────────────────── */
    .md-body {
      color: #E8E3D8;
      font-size: 0.95rem;
      line-height: 1.75;
    }
    .md-body h1, .md-body h2, .md-body h3,
    .md-body h4, .md-body h5, .md-body h6 {
      color: var(--text-inv);
      margin-top: 1.4em;
      margin-bottom: .4em;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .md-body h1 { font-size: 1.4rem; }
    .md-body h2 { font-size: 1.2rem; }
    .md-body h3 { font-size: 1.05rem; }
    .md-body p { margin-bottom: .8em; }
    .md-body ul, .md-body ol {
      padding-left: 1.4em;
      margin-bottom: .8em;
    }
    .md-body li { margin-bottom: .3em; }
    .md-body code {
      font-family: var(--mono);
      font-size: 0.85em;
      background: #1E1E1E;
      color: #A8FF78;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .md-body pre {
      margin: .8em 0;
      border-radius: var(--radius-sm);
      overflow: auto;
    }
    .md-body pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      border-radius: 0;
      font-size: 0.875rem;
    }
    .md-body blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 14px;
      color: #AAA;
      margin: .8em 0;
    }
    .md-body a { color: var(--accent); }
    .md-body strong { color: var(--text-inv); font-weight: 600; }
    .md-body hr {
      border: none;
      border-top: 1px solid #2A2A2A;
      margin: 1.2em 0;
    }
    .md-body table {
      border-collapse: collapse;
      width: 100%;
      margin: .8em 0;
      font-size: 0.9rem;
    }
    .md-body th, .md-body td {
      border: 1px solid #2A2A2A;
      padding: 8px 12px;
      text-align: left;
    }
    .md-body th { background: #1A1A1A; color: var(--text-inv); }

    /* ─── History panel ──────────────────────────────────────────────────── */
    .history-section {
      margin-top: 40px;
    }
    .section-title {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-card {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      border: 1.5px solid transparent;
      transition: border-color .15s, background .15s;
    }
    .history-card:hover {
      border-color: var(--accent);
      background: #0A0A0A;
    }
    .history-card:active { transform: scale(.99); }
    .history-q {
      color: var(--text-inv);
      font-size: 0.9rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .history-time {
      font-size: 0.78rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ─── Empty state ────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 24px 0;
    }

    /* ─── Footer ─────────────────────────────────────────────────────────── */
    .footer {
      margin-top: 60px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .footer a { color: var(--muted); }

    /* ─── Streaming cursor ──────────────────────────────────────────────── */
    @keyframes blink { 50% { opacity: 0; } }
    .md-body.streaming::after {
      content: "▍";
      color: var(--accent);
      animation: blink .7s step-start infinite;
      margin-left: 2px;
    }

    /* ─── Focus-visible ring ─────────────────────────────────────────────── */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── configure marked ─────────────────────────────────────────────── */
    marked.setOptions({
      breaks: true,
      gfm: true,
    });

    /* custom renderer to add hljs class to fenced code blocks */
    const renderer = new marked.Renderer();
    renderer.code = ({ text, lang }) => {
      const language = hljs.getLanguage(lang) ? lang : "plaintext";
      const highlighted = hljs.highlight(text, { language }).value;
      return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
    };
    marked.use({ renderer });

    /* ── helpers ──────────────────────────────────────────────────────── */
    function renderMd(markdown) {
      const html = marked.parse(markdown ?? "");
      return DOMPurify.sanitize(html, {
        ADD_TAGS: ["code", "pre", "span"],
        ADD_ATTR: ["class"],
      });
    }

    function fmt(ts) {
      return new Date(ts).toLocaleTimeString("ru-RU", {
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function errorMessage(err) {
      if (!err) return null;
      if (err.type === "empty") return "Введите вопрос перед отправкой.";
      if (err.type === "network") return "Нет соединения с сервером. Проверьте интернет.";
      // SSE stream errors carry a reason string
      if (err.reason === "no_key") return "AI-сервис недоступен — API-ключ не настроен. Обратитесь к администратору.";
      if (err.reason === "rate_limit") return "Слишком много запросов. Подождите немного и повторите.";
      if (err.reason === "timeout") return "Запрос выполнялся слишком долго. Попробуйте ещё раз.";
      if (err.reason === "invalid_output") return "Не удалось разобрать ответ AI. Попробуйте ещё раз.";
      if (err.reason) return `Ошибка AI (${err.reason}). Попробуйте позже.`;
      // HTTP status errors (non-SSE path, fallback)
      if (err.status === 429) return "Слишком много запросов. Подождите немного и повторите.";
      if (err.status === 503) return "AI-сервис недоступен — API-ключ не настроен. Обратитесь к администратору.";
      if (err.status === 504) return "Запрос выполнялся слишком долго. Попробуйте ещё раз.";
      if (err.status === 422) return "Некорректный запрос. Попробуйте переформулировать вопрос.";
      return `Ошибка сервера (${err.status ?? "неизвестно"}). Попробуйте позже.`;
    }

    /* ── ErrorBanner ──────────────────────────────────────────────────── */
    function ErrorBanner({ error }) {
      const msg = errorMessage(error);
      if (!msg) return null;
      return (
        <div className="error-banner" role="alert">
          <span className="error-icon">⚠</span>
          <span>{msg}</span>
        </div>
      );
    }

    /* ── QuestionForm ─────────────────────────────────────────────────── */
    function QuestionForm({ onSubmit, loading }) {
      const [text, setText] = useState("");
      const textareaRef = useRef(null);

      // expose a way for history clicks to fill the textarea
      QuestionForm._setQuestion = useCallback((q) => {
        setText(q);
        textareaRef.current?.focus();
      }, []);

      function handleSubmit() {
        const trimmed = text.trim();
        if (!trimmed) {
          onSubmit(null, { type: "empty" });
          return;
        }
        onSubmit(trimmed, null);
      }

      function handleKeyDown(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          handleSubmit();
        }
        if (e.key === "Escape") {
          setText("");
        }
      }

      return (
        <div className="form-card">
          <label className="form-label" htmlFor="question">Ваш вопрос</label>
          <textarea
            id="question"
            ref={textareaRef}
            className="form-textarea"
            placeholder="Например: Как правильно настроить индексы в PostgreSQL для full-text search?"
            value={text}
            onChange={e => setText(e.target.value)}
            onKeyDown={handleKeyDown}
            disabled={loading}
            aria-label="Введите вопрос"
          />
          <div className="form-footer">
            <span className="form-hint">Ctrl+Enter — отправить &nbsp;·&nbsp; Esc — очистить</span>
            <button
              className="btn btn-primary"
              onClick={handleSubmit}
              disabled={loading}
              aria-label={loading ? "Загрузка..." : "Задать вопрос"}
            >
              {loading ? (
                <>
                  <span className="spinner" aria-hidden="true" />
                  Думаю…
                </>
              ) : (
                "Ask AI →"
              )}
            </button>
          </div>
        </div>
      );
    }

    /* ── AnswerCard ───────────────────────────────────────────────────── */
    function AnswerCard({ answer, streamingText }) {
      const [copied, setCopied] = useState(false);
      const isStreaming = !answer && streamingText;

      if (!answer && !streamingText) return null;

      function handleCopy() {
        navigator.clipboard.writeText(answer.markdown).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1500);
        });
      }

      return (
        <div className="answer-card" aria-live="polite">
          <div className="answer-header">
            <span className="answer-label">
              {isStreaming ? "Генерирую ответ…" : "Ответ AI"}
            </span>
            {answer && (
              <button
                className="btn btn-ghost copy-btn"
                onClick={handleCopy}
                aria-label="Скопировать ответ"
              >
                {copied ? "✓ Copied!" : "Copy"}
              </button>
            )}
          </div>
          {isStreaming ? (
            /* Raw streaming text — rendered as Markdown incrementally */
            <div
              className="md-body streaming"
              dangerouslySetInnerHTML={{ __html: renderMd(streamingText) }}
            />
          ) : (
            <div
              className="md-body"
              dangerouslySetInnerHTML={{ __html: renderMd(answer.markdown) }}
            />
          )}
        </div>
      );
    }

    /* ── HistoryPanel ─────────────────────────────────────────────────── */
    function HistoryPanel({ items, onSelect }) {
      if (!items) return null;

      return (
        <div className="history-section">
          <p className="section-title">История запросов</p>
          {items.length === 0 ? (
            <p className="empty-state">Запросов пока нет — задайте первый вопрос.</p>
          ) : (
            <div className="history-list">
              {items.map((item, idx) => (
                <div
                  key={idx}
                  className="history-card"
                  role="button"
                  tabIndex={0}
                  onClick={() => onSelect(item.question)}
                  onKeyDown={e => (e.key === "Enter" || e.key === " ") && onSelect(item.question)}
                  aria-label={`Повторить вопрос: ${item.question}`}
                >
                  <span className="history-q">{item.question}</span>
                  <span className="history-time">{item.time ? fmt(item.time) : ""}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ── App (root) ───────────────────────────────────────────────────── */
    function App() {
      const [answer, setAnswer]         = useState(null);
      const [streamingText, setStreaming] = useState(""); // live typewriter
      const [loading, setLoading]       = useState(false);
      const [error, setError]           = useState(null);
      const [history, setHistory]       = useState(null); // null = not loaded yet

      /* load history on mount */
      useEffect(() => {
        fetch("/history")
          .then(r => r.json())
          .then(data => {
            setHistory(data.map(item => ({ ...item, time: null })));
          })
          .catch(() => setHistory([]));
      }, []);

      async function handleSubmit(question, clientError) {
        setError(null);

        if (clientError) {
          setError(clientError);
          return;
        }

        setLoading(true);
        setAnswer(null);
        setStreaming("");

        try {
          const res = await fetch("/ask/stream", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ question }),
          });

          if (!res.ok) {
            setError({ status: res.status });
            return;
          }

          /* Read SSE chunks line-by-line */
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = "";

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split("\n");
            buf = lines.pop(); // keep incomplete last line

            for (const line of lines) {
              if (!line.startsWith("data: ")) continue;
              const payload = JSON.parse(line.slice(6));

              if (payload.error) {
                setError({ reason: payload.error });
                return;
              }
              if (payload.chunk !== undefined) {
                setStreaming(prev => prev + payload.chunk);
              }
              if (payload.done) {
                setAnswer({ markdown: payload.answer });
                setStreaming("");
                setHistory(prev => {
                  const entry = { question, answer: payload.answer, time: Date.now() };
                  return [entry, ...(prev ?? [])].slice(0, 5);
                });
              }
            }
          }
        } catch {
          setError({ type: "network" });
        } finally {
          setLoading(false);
        }
      }

      function handleHistorySelect(question) {
        QuestionForm._setQuestion?.(question);
      }

      return (
        <main className="page">
          <header className="header">
            <h1>Relay <span>·</span> AI Team Assistant</h1>
            <p>Быстрые структурированные ответы для команды разработчиков</p>
          </header>

          <QuestionForm onSubmit={handleSubmit} loading={loading} />

          <ErrorBanner error={error} />

          <AnswerCard answer={answer} streamingText={streamingText} />

          <HistoryPanel items={history} onSelect={handleHistorySelect} />

          <footer className="footer">
            <span>Powered by Claude claude-haiku-4-5 &nbsp;·&nbsp; <a href="/history">/history</a></span>
          </footer>
        </main>
      );
    }

    /* ── Mount ────────────────────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
