repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Verify the latest tag before committing: `pre-commit autoupdate`.
    rev: v0.15.18
    hooks:
      # Linter id is now `ruff-check` (old `ruff` still works as an alias).
      # Lint hook runs before format hook so autofixes get reformatted.
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        pass_filenames: false
        args: ["app", "main.py"]
        additional_dependencies:
          - "pydantic>=2.0"
          - "pydantic-settings>=2.0"
          - "fastapi>=0.115"
          - "anthropic>=0.40"
          - "tenacity>=9.0"
